# Persistent Volume and Claim for MLOps Portfolio
# Mounts project root at /app in Kubernetes pods
# hostPath type for Docker Desktop local development

apiVersion: v1
kind: PersistentVolume
metadata:
  name: mlops-portfolio-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    # Docker Desktop on Windows: use /run/desktop/mnt/host/ prefix for host paths
    path: /run/desktop/mnt/host/c/Users/loren/Documents/mlops-portfolio
    type: DirectoryOrCreate

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlops-portfolio-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: manual
  volumeName: mlops-portfolio-pv
