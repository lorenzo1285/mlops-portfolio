stages:
  ingest:
    cmd: python -m src.ingest.run
    deps:
      - src/ingest/run.py
      - src/utils.py
    params:
      - data.raw_path
      - data.processed_dir
    outs:
      - data/processed/raw.csv

  validate:
    cmd: python -m src.validate.run
    deps:
      - src/validate/run.py
      - src/utils.py
      - data/processed/raw.csv
      - great_expectations/gx/great_expectations.yml
      - great_expectations/gx/expectations/crash_data_suite.json
    params:
      - great_expectations.suite_name
      - great_expectations.datasource_name
    outs:
      - great_expectations/gx/uncommitted/data_docs:
          cache: false

  featurize:
    cmd: python -m src.featurize.run
    deps:
      - src/featurize/run.py
      - src/utils.py
      - data/processed/raw.csv
    params:
      - data.test_size
      - data.random_state
      - data.sentinel_value
    outs:
      - data/processed/X_train.npy
      - data/processed/X_test.npy
      - data/processed/y_train.npy
      - data/processed/y_test.npy
      - models/preprocessing_pipeline.joblib

  train_ml:
    cmd: python -m src.train_ml.run
    deps:
      - src/train_ml/run.py
      - src/utils.py
      - data/processed/X_train.npy
      - data/processed/X_test.npy
      - data/processed/y_train.npy
      - data/processed/y_test.npy
      - models/preprocessing_pipeline.joblib
    params:
      - model.class_weight_neg
      - model.class_weight_pos
      - model.n_select
      - mlflow.experiment_name_ml
      - mlflow.tracking_uri
      - ab_test.seeds
    outs:
      - models/best_ml_model.pkl

  train_dl:
    cmd: python -m src.train_dl.run
    deps:
      - src/train_dl/run.py
      - src/utils.py
      - data/processed/X_train.npy
      - data/processed/X_test.npy
      - data/processed/y_train.npy
      - data/processed/y_test.npy
    params:
      - model.class_weight_pos
      - dl.epochs
      - dl.patience
      - dl.batch_size
      - dl.lr
      - dl.hidden_1
      - dl.hidden_2
      - dl.dropout
      - mlflow.experiment_name_dl
      - mlflow.tracking_uri
      - ab_test.seeds
    outs:
      - models/mlp_model.pth

  evaluate:
    cmd: python -m src.evaluate.run
    deps:
      - src/evaluate/run.py
      - src/utils.py
      - models/best_ml_model.pkl
      - models/mlp_model.pth
      - data/processed/X_test.npy
      - data/processed/y_test.npy
      - models/preprocessing_pipeline.joblib
    params:
      - model.macro_f1_threshold
      - model.minority_recall_threshold
      - mlflow.experiment_name_ml
      - mlflow.experiment_name_dl
      - mlflow.tracking_uri
      - ab_test.alpha
      - ab_test.tiebreak
    outs:
      - docs/evaluation_report.json
      - docs/ab_test_comparison.json

  register:
    cmd: python -m src.register.run
    deps:
      - src/register/run.py
      - src/utils.py
      - docs/evaluation_report.json
    params:
      - mlflow.model_name
      - mlflow.experiment_name_ml
      - mlflow.experiment_name_dl
      - mlflow.tracking_uri
    # No outs: register writes only to MLflow Model Registry, not the filesystem
